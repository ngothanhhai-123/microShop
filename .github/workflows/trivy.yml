name: Trivy FS Scan

on:
  push:
    branches:
      - tho
  pull_request:
    branches:
      - tho
  workflow_dispatch:

jobs:
  trivy-fs-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0
