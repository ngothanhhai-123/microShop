name: DAST Full Scan

on:
  schedule:
    - cron: '0 0 */3 * *'   # 3 ngày chạy 1 lần
  workflow_dispatch:       # Cho phép chạy thủ công để demo

jobs:
  zap_full_scan:
    runs-on: ubuntu-latest
    name: Quy trình Kiểm duyệt DAST Full Scan

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: microshop_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    env:
      QUALITY_GATE: "on"   

    steps:
      - name: 1. Checkout source
        uses: actions/checkout@v4

      - name: 2. Import Database
        run: |
          mysql -h 127.0.0.1 -u root -proot microshop_db < database/database_schema.sql
          mysql -h 127.0.0.1 -u root -proot microshop_db < database/root_data.sql
          mysql -h 127.0.0.1 -u root -proot microshop_db < database/mock_ff.sql
          mysql -h 127.0.0.1 -u root -proot microshop_db < database/mock_lq.sql
          mysql -h 127.0.0.1 -u root -proot microshop_db < database/mock_riot.sql
          mysql -h 127.0.0.1 -u root -proot microshop_db < database/mock_steam_game.sql

      - name: 3. Fix context.xml path
        run: sed -i 's|C:/Users/os/Desktop/microshop_uploads|/tmp/microshop_uploads|g' src/main/webapp/META-INF/context.xml

      - name: 4. Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: 5. Build WAR
        run: mvn clean package -DskipTests

      - name: 6. Build Docker image
        run: docker build -t micro-shop-app .

      - name: 7. Run container
        run: |
          docker run -d -p 8080:8080 --name micro-shop-test micro-shop-app
          sleep 40

      - name: 8. Fix permission
        run: chmod -R 777 $GITHUB_WORKSPACE

      - name: 9. Run OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: 'http://localhost:8080/'
          cmd_options: '-a'
          fail_action: ${{ env.QUALITY_GATE == 'on' }}