name: DAST Full Scan

on:
  push:
    branches:
      - '**'
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

jobs:
  zap_full_scan:
    runs-on: ubuntu-latest
    name: Quy trình Kiểm duyệt DAST Full Scan

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: microshop_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: 1. Checkout source
        uses: actions/checkout@v4

      - name: 2. Import Database
        run: |
          mysql -h 127.0.0.1 -u root -proot microshop_db < database/database_schema.sql
          mysql -h 127.0.0.1 -u root -proot microshop_db < database/root_data.sql
          mysql -h 127.0.0.1 -u root -proot microshop_db < database/mock_ff.sql
          mysql -h 127.0.0.1 -u root -proot microshop_db < database/mock_lq.sql
          mysql -h 127.0.0.1 -u root -proot microshop_db < database/mock_riot.sql
          mysql -h 127.0.0.1 -u root -proot microshop_db < database/mock_steam_game.sql

      - name: 3. Fix context.xml path
        run: |
          sed -i 's|C:/Users/os/Desktop/microshop_uploads|/tmp/microshop_uploads|g' src/main/webapp/META-INF/context.xml

      - name: 4. Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: 5. Build WAR
        run: mvn clean package -DskipTests

      - name: 6. Build Docker image
        run: docker build -t micro-shop-app .

      - name: 7. Run container
        run: |
          docker run -d -p 8080:8080 --name micro-shop-test micro-shop-app
          echo "Waiting for application..."
          until curl -s http://localhost:8080/microShop > /dev/null; do
            sleep 5
          done
          echo "Application is ready"

      - name: 8. Run OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'http://localhost:8080/microShop'
          cmd_options: '-a -config spider.maxDepth=10 -J zap-report.json'
          fail_action: false

      - name: Debug files
        run: ls -la

      # Download previous scan
      - name: 9. Download previous report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: zap-baseline
          path: previous_scan

      - name: 10. Evaluate Quality Gate
        shell: bash
        run: |
          echo "Evaluating vulnerabilities..."
          
          # Kiểm tra xem file có tồn tại không, nếu không thử tìm trong thư mục mặc định của ZAP
          if [ ! -f zap-report.json ]; then
            if [ -f report_json.json ]; then cp report_json.json zap-report.json; fi
          fi

          if [ ! -f zap-report.json ]; then
            echo "❌ ZAP report not found! Check Step 8 output."
            exit 1
          fi

          # Lấy số lượng lỗi, mặc định là 0 nếu null
          NEW_HIGH=$(jq '[.site[].alerts[]? | select(.riskcode=="3")] | length' zap-report.json || echo 0)
          NEW_MED=$(jq '[.site[].alerts[]? | select(.riskcode=="2")] | length' zap-report.json || echo 0)

          OLD_HIGH=0
          OLD_MED=0

          if [ -f previous_scan/zap-report.json ]; then
            OLD_HIGH=$(jq '[.site[].alerts[]? | select(.riskcode=="3")] | length' previous_scan/zap-report.json || echo 0)
            OLD_MED=$(jq '[.site[].alerts[]? | select(.riskcode=="2")] | length' previous_scan/zap-report.json || echo 0)
          fi

          echo "----------------------------------"
          echo "Previous High: $OLD_HIGH | Current High : $NEW_HIGH"
          echo "Previous Medium: $OLD_MED | Current Medium : $NEW_MED"
          echo "----------------------------------"

          if [ "$NEW_HIGH" -gt "$OLD_HIGH" ] || [ "$NEW_MED" -gt "$OLD_MED" ]; then
            echo "🚫 QUALITY GATE FAILED: New vulnerabilities detected!"
            exit 1
          else
            echo "✅ QUALITY GATE PASSED: No new vulnerabilities added."
          fi

      - name: 11. Save baseline report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline
          path: zap-report.json